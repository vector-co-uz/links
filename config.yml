# Site Configuration

# Theme, mapped to the directory: ./theme/xxxx
theme: default

# HTML Language setting
lang: "ru"

# Plugins, implemented in ./plugins/PLUGIN_NAME
# Use {{ vars.PLUGIN_NAME }} in the settings below

# The output of the plugin can be used below, e.g., {{vars.GithubRepoStarsCountPlugin}}
#plugins:

# HTML Title
title: "Vector Links"

# Avatar image path
avatar: "./images/profile.jpg"

# Name section text
name: "Vector.co.uz"

# Tagline section text
tagline: >-
    A web and automation enthusiast exploring self-hosting, open-source, and practical solutions.

# List of links
# icon: Use Font Awesome icons (https://fontawesome.com/search?o=r&m=free)
# text: The displayed text for the link
# title: The url title
# url: The URL of the link
# alt: Alternative text for accessibility
# target: `_blank` opens in a new tab, `_self` opens in the same frame
links:
  - link:
      icon: "fa-solid fa-web-awesome"
      text: "Homepage"
      url: "https://vector.co.uz"
      alt: "Homepage"
      title: "Homepage"
      target: "_blank"
  - link:
      icon: "fa-brands fa-github"
      text: "Github"
      url: "https://github.com/vector-co-uz/"
      alt: "Github profile"
      title: "Github profile"
      target: "_blank"
  - link:
      icon: "fa-brands fa-telegram"
      text: "Telegram"
      url: "https://t.me/vector_co_uz"
      alt: "Vector.co.uz Telegram"
      title: "Vector.co.uz Telegram"
      target: "_blank"
  - link:
      icon: "fa-brands fa-facebook"
      text: "Facebook"
      url: "https://www.facebook.com/vector.co.uz/"
      alt: "Vector.co.uz Facebook"
      title: "Vector.co.uz Facebook"
      target: "_blank"
  - link:
      icon: "fa-solid fa-at"
      text: "Email"
      url: "mailto:vector.co.uz@gmail.com"
      alt: "Vector.co.uz Email adress"
      title: "Vector.co.uz Email adress"
      target: "_blank"
  - link:
      icon: "fa-brands fa-whatsapp"
      text: "Whatsapp"
      url: "https://wa.me/qr/ZWB32OIOZN2VH1"
      alt: "Vector.co.uz Whatsapp"
      title: "Vector.co.uz Whatsapp"
      target: "_blank"


# List of social media links
# icon: Use Font Awesome icons (https://fontawesome.com/search?o=r&m=free)
# title: The url title
# url: The URL of the social media link
# alt: Alternative text for accessibility
# target: _blank opens in a new tab, _self opens in the same frame
  - social:
      icon: "fa-brands fa-github"
      url: "https://github.com/vector-co-uz/"
      title: "vector's GitHub"
      alt: "vector's GitHub"
      target: "_blank"
  - social:
      icon: "fa-brands fa-instagram"
      url: "https://www.instagram.com/vector.co.uz/"
      title: "Instagram"
      alt: "Vector's Instagram"
      target: "_blank"
  - social:
      icon: "fa-solid fa-envelope"
      url: "mailto:vector.co.uz@gmail.com"
      title: "Email: vector.co.uz@gmail.com"
      alt: "vector.co.uz@gmail.com"
      target: "_blank"

# Footer text
footer: >
    Hi there! Follow me on GitHub, or stay connected on Instagram.

